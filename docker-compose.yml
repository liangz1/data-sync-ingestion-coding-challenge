# This is your workspace for the assignment.
# PostgreSQL is provided for your solution.
# Add your services as needed.

services:
  postgres:
    image: postgres:16-alpine
    container_name: assignment-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ingestion
    ports:
      - "5434:5432"
    volumes:
      - assignment_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - assignment-network

  # Add your ingestion service(s) here
  # Example:
  #
  # ingestion:
  #   build: ./packages/ingestion
  #   container_name: assignment-ingestion
  #   environment:
  #     DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ingestion
  #     API_BASE_URL: https://datasync-api.example.com
  #     TARGET_API_KEY: your_api_key_here
  #     # Note: Use header-based auth (X-API-Key header) for best rate limits
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - assignment-network

  ingestion:
    build: ./packages/ingestion
    container_name: assignment-ingestion
    environment:
      API_BASE_URL: ${API_BASE_URL}
      TARGET_API_KEY: ${TARGET_API_KEY}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ingestion
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - assignment-network

  mock-api:
    build: ./mock-api
    container_name: assignment-mock-api
    environment:
      PORT: 8787
      MOCK_TOTAL_EVENTS: 3000
      MOCK_MAX_LIMIT: 1000
      MOCK_REQUIRE_API_KEY: "true"
      MOCK_API_KEY: "mock-key"
      MOCK_RATE_LIMIT_EVERY_N: 0
      MOCK_RETRY_AFTER_SECONDS: 1
      MOCK_RATELIMIT_REMAINING: 99
      MOCK_CURSOR_TTL_SECONDS: 2
      MOCK_RESPONSE_DELAY_MS: 0
      MOCK_BREAK_PROTOCOL_AT_CURSOR: ""
    networks:
      - assignment-network

volumes:
  assignment_postgres_data:

networks:
  assignment-network:
    driver: bridge
